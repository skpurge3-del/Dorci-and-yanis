<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorcina & Yanis - Mariage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe6f0, #ffc0d5, #ffd6e8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
        }

        .coeur {
            text-align: center;
            font-size: 18px;
            line-height: 1.4;
            color: #d6336c;
            animation: pulse 2s infinite;
        }

        .coeur pre {
            font-family: monospace;
            line-height: 1.2;
        }

        .noms {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #c9184a;
            letter-spacing: 2px;
        }

        .noms span {
            color: #ff4d6d;
        }

        .love {
            margin-top: 10px;
            font-size: 20px;
            color: #a4133c;
            font-style: italic;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .anneaux {
            font-size: 30px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
